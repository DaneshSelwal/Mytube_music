name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # triggers on any tag like v1.0.0, v1.2.3

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv ${{ steps.sign_apk.outputs.signedReleaseFile }} \
             app/build/outputs/apk/release/MyTubeMusic-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/MyTubeMusic-*.apk
          name: MyTube Music ${{ github.ref_name }}
          body: |
            ## MyTube Music ${{ github.ref_name }}

            ### Install
            1. Download the APK below
            2. Enable "Install unknown apps" on your Android device
            3. Open the APK and install
            4. Place `.mp3` files in `/sdcard/Music/`

            ### What's new
            See commit history for changes in this release.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
